<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>AR Draw Pro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

:root{
  --void:#050508;
  --glass:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.12);
  --neon:#00ffb3;
  --neon2:#7b5cff;
  --danger:#ff3c78;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:'DM Sans',sans-serif;
  touch-action:none;
  color:white;
}

#camera-container{
  position:fixed;
  inset:0;
  background:black;
}

#video{
  width:100%;
  height:100%;
  object-fit:cover;
}

#draw-canvas{
  position:fixed;
  inset:0;
  touch-action:none;
}

#splash{
  position:fixed;
  inset:0;
  z-index:100;
  background:#050508;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  transition:0.4s;
}

#splash.hidden{
  opacity:0;
  pointer-events:none;
}

.logo{
  width:80px;
  height:80px;
  border-radius:24px;
  background:linear-gradient(135deg,var(--neon2),var(--neon));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  box-shadow:0 0 40px rgba(123,92,255,0.5);
}

.title{
  font-family:'Space Mono',monospace;
  letter-spacing:5px;
  font-size:28px;
}

.start-btn{
  border:none;
  border-radius:999px;
  padding:14px 36px;
  font-family:'Space Mono',monospace;
  background:linear-gradient(135deg,var(--neon2),var(--neon));
  color:black;
  font-weight:700;
  cursor:pointer;
}

#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:20;
}

.top-bar{
  pointer-events:all;
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:52px 16px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
}

.mode{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid var(--glass-border);
  background:var(--glass);
  font-size:11px;
  letter-spacing:2px;
  font-family:'Space Mono',monospace;
}

.spacer{
  flex:1;
}

.icon-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid var(--glass-border);
  background:var(--glass);
  backdrop-filter:blur(10px);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
}

.bottom-bar{
  pointer-events:all;
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:12px 16px calc(var(--safe-bottom) + 18px);
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.color-row{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.color{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid transparent;
  flex-shrink:0;
}

.color.active{
  border-color:white;
  transform:scale(1.15);
}

.slider{
  width:80px;
}

.tool-row{
  display:flex;
  gap:8px;
}

.tool{
  flex:1;
  height:48px;
  border-radius:14px;
  border:1px solid var(--glass-border);
  background:var(--glass);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  cursor:pointer;
  font-size:14px;
}

.tool.active{
  background:rgba(123,92,255,0.35);
  border-color:var(--neon2);
}

.tool.delete-active{
  background:rgba(255,60,120,0.3);
  border-color:var(--danger);
}

#img-panel{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:40;
  background:rgba(10,10,15,0.96);
  backdrop-filter:blur(18px);
  border-top:1px solid var(--glass-border);
  border-radius:24px 24px 0 0;
  padding:16px;
  transform:translateY(100%);
  transition:0.35s;
}

#img-panel.open{
  transform:translateY(0);
}

.grid{
  margin-top:12px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.thumb{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  border-radius:10px;
  border:2px solid transparent;
}

.thumb.selected{
  border-color:var(--neon2);
}

.upload{
  aspect-ratio:1;
  border-radius:10px;
  border:2px dashed rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.done{
  margin-top:14px;
  width:100%;
  height:46px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
}

#toast{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px 18px;
  border-radius:20px;
  opacity:0;
  transition:0.2s;
  z-index:80;
}

#toast.show{
  opacity:1;
}

#hint{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.7);
  padding:12px 18px;
  border-radius:16px;
  opacity:0;
  transition:0.2s;
  z-index:90;
}

#hint.show{
  opacity:1;
}

input[type=file]{
  display:none;
}
</style>
</head>

<body>

<div id="splash">
  <div class="logo">✏️</div>
  <div class="title">AR DRAW</div>
  <button class="start-btn" onclick="startApp()">OPEN CAMERA</button>
</div>

<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
</div>

<canvas id="draw-canvas"></canvas>

<div id="toast"></div>
<div id="hint"></div>

<div id="ui">

  <div class="top-bar">
    <div class="mode" id="mode-label">DRAW</div>
    <div class="spacer"></div>

    <div class="icon-btn" onclick="flipCamera()">🔄</div>
    <div class="icon-btn" onclick="saveCanvas()">💾</div>
    <div class="icon-btn" onclick="clearAll()">🗑️</div>
  </div>

  <div class="bottom-bar">

    <div class="color-row">

      <div class="color active" style="background:#ffffff" data-color="#ffffff"></div>
      <div class="color" style="background:#00ffb3" data-color="#00ffb3"></div>
      <div class="color" style="background:#ff3c78" data-color="#ff3c78"></div>
      <div class="color" style="background:#7b5cff" data-color="#7b5cff"></div>
      <div class="color" style="background:#ffd700" data-color="#ffd700"></div>

      <input type="range" class="slider" min="2" max="40" value="6" id="size-slider">

    </div>

    <div class="tool-row">

      <div class="tool active" id="tool-draw">
        ✏️ Draw
      </div>

      <div class="tool" id="tool-stamp">
        🖼️ Stamp
      </div>

      <div class="tool" id="tool-delete">
        🗑️ Delete
      </div>

      <div class="tool" onclick="togglePanel()">
        📁 Images
      </div>

    </div>

  </div>

</div>

<div id="img-panel">

  <div class="grid" id="img-grid">

    <div class="upload" onclick="document.getElementById('file-input').click()">
      +
    </div>

  </div>

  <button class="done" onclick="togglePanel()">Done</button>

</div>

<input type="file" id="file-input" accept="image/*" multiple>

<script>
const state = {
  tool:'draw',
  color:'#ffffff',
  brushSize:6,

  isDrawing:false,
  lastX:0,
  lastY:0,

  images:[],
  selectedImg:null,

  placedImages:[],
  activeImage:null,

  dragOffsetX:0,
  dragOffsetY:0,

  deleteMode:false,

  stream:null,
  cameraFacing:'environment'
};

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  redrawCanvas();
}

window.addEventListener('resize',resizeCanvas);
resizeCanvas();

/* CAMERA */

async function startApp(){

  try{

    if(state.stream){
      state.stream.getTracks().forEach(t=>t.stop());
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:state.cameraFacing
      }
    });

    state.stream = stream;

    const video = document.getElementById('video');

    video.srcObject = stream;

    video.style.transform =
      state.cameraFacing === 'user'
      ? 'scaleX(-1)'
      : 'scaleX(1)';

  }catch(e){
    showToast('Camera unavailable');
  }

  document.getElementById('splash').classList.add('hidden');
}

async function flipCamera(){

  state.cameraFacing =
    state.cameraFacing === 'environment'
    ? 'user'
    : 'environment';

  await startApp();
}

/* TOOLS */

function setTool(tool){

  state.tool = tool;

  document.getElementById('tool-draw')
    .classList.toggle('active',tool==='draw');

  document.getElementById('tool-stamp')
    .classList.toggle('active',tool==='stamp');

  document.getElementById('mode-label')
    .textContent = tool.toUpperCase();
}

document.getElementById('tool-draw').onclick = ()=>{
  setTool('draw');
};

document.getElementById('tool-stamp').onclick = ()=>{
  setTool('stamp');
};

document.getElementById('tool-delete').onclick = ()=>{

  state.deleteMode = !state.deleteMode;

  document.getElementById('tool-delete')
    .classList.toggle('delete-active',state.deleteMode);

  showToast(
    state.deleteMode
      ? 'Tap image to delete'
      : 'Delete mode off'
  );
};

/* COLORS */

document.querySelectorAll('.color').forEach(el=>{

  el.onclick = ()=>{

    document.querySelectorAll('.color')
      .forEach(c=>c.classList.remove('active'));

    el.classList.add('active');

    state.color = el.dataset.color;
  };

});

document.getElementById('size-slider').oninput = e=>{
  state.brushSize = parseInt(e.target.value);
};

/* POSITION */

function getPos(e){

  const rect = canvas.getBoundingClientRect();

  const src = e.touches ? e.touches[0] : e;

  return [
    src.clientX - rect.left,
    src.clientY - rect.top
  ];
}

/* BACKGROUND REMOVAL */

function removeBackground(img){

  const temp = document.createElement('canvas');
  const tctx = temp.getContext('2d');

  temp.width = img.width;
  temp.height = img.height;

  tctx.drawImage(img,0,0);

  const imageData = tctx.getImageData(
    0,
    0,
    temp.width,
    temp.height
  );

  const data = imageData.data;

  for(let i=0;i<data.length;i+=4){

    const r = data[i];
    const g = data[i+1];
    const b = data[i+2];

    if(r > 235 && g > 235 && b > 235){
      data[i+3] = 0;
    }

    if(r < 18 && g < 18 && b < 18){
      data[i+3] = 0;
    }
  }

  tctx.putImageData(imageData,0,0);

  const cleaned = new Image();

  cleaned.src = temp.toDataURL('image/png');

  return cleaned;
}

/* IMAGE DRAWING */

function redrawCanvas(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  state.placedImages.forEach(obj=>{

    ctx.save();

    ctx.globalAlpha = obj.opacity;

    ctx.drawImage(
      obj.img,
      obj.x - obj.size/2,
      obj.y - obj.size/2,
      obj.size,
      obj.size
    );

    if(state.activeImage === obj){

      ctx.strokeStyle = '#7b5cff';
      ctx.lineWidth = 2;

      ctx.strokeRect(
        obj.x - obj.size/2,
        obj.y - obj.size/2,
        obj.size,
        obj.size
      );

      ctx.fillStyle = '#00ffb3';

      ctx.beginPath();

      ctx.arc(
        obj.x + obj.size/2,
        obj.y + obj.size/2,
        10,
        0,
        Math.PI * 2
      );

      ctx.fill();
    }

    ctx.restore();

  });

}

function getImageAt(x,y){

  for(let i = state.placedImages.length - 1; i >= 0; i--){

    const obj = state.placedImages[i];

    const half = obj.size / 2;

    if(
      x >= obj.x-half &&
      x <= obj.x+half &&
      y >= obj.y-half &&
      y <= obj.y+half
    ){
      return obj;
    }

  }

  return null;
}

/* DRAWING */

function startDraw(e){

  e.preventDefault();

  const [x,y] = getPos(e);

  if(state.tool === 'stamp'){

    const tapped = getImageAt(x,y);

    if(tapped && state.deleteMode){

      state.placedImages =
        state.placedImages.filter(i=>i!==tapped);

      redrawCanvas();

      showToast('Image deleted');

      return;
    }

    if(tapped){

      state.activeImage = tapped;

      state.dragOffsetX = x - tapped.x;
      state.dragOffsetY = y - tapped.y;

      redrawCanvas();

      return;
    }

    if(!state.selectedImg){

      showToast('Pick an image first');

      togglePanel();

      return;
    }

    const img = new Image();

    img.onload = ()=>{

      const cleaned = removeBackground(img);

      cleaned.onload = ()=>{

        const obj = {
          img:cleaned,
          x,
          y,
          size:140,
          opacity:1
        };

        state.placedImages.push(obj);

        state.activeImage = obj;

        redrawCanvas();
      };
    };

    img.src = state.selectedImg;

    return;
  }

  state.isDrawing = true;

  state.lastX = x;
  state.lastY = y;

  ctx.beginPath();

  ctx.arc(
    x,
    y,
    state.brushSize/2,
    0,
    Math.PI * 2
  );

  ctx.fillStyle = state.color;

  ctx.fill();
}

function draw(e){

  e.preventDefault();

  const [x,y] = getPos(e);

  if(state.tool === 'stamp' && state.activeImage){

    if(e.touches && e.touches.length === 2){
      return;
    }

    state.activeImage.x = x - state.dragOffsetX;
    state.activeImage.y = y - state.dragOffsetY;

    redrawCanvas();

    return;
  }

  if(!state.isDrawing || state.tool !== 'draw'){
    return;
  }

  ctx.beginPath();

  ctx.moveTo(state.lastX,state.lastY);

  ctx.lineTo(x,y);

  ctx.strokeStyle = state.color;
  ctx.lineWidth = state.brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.stroke();

  state.lastX = x;
  state.lastY = y;
}

function endDraw(){

  state.isDrawing = false;

  state.activeImage = null;
}

canvas.addEventListener('touchstart',startDraw,{passive:false});
canvas.addEventListener('touchmove',draw,{passive:false});
canvas.addEventListener('touchend',endDraw);

canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',draw);
canvas.addEventListener('mouseup',endDraw);

/* PINCH RESIZE */

let lastPinchDist = null;

canvas.addEventListener('touchmove',(e)=>{

  if(
    e.touches.length === 2 &&
    state.tool === 'stamp' &&
    state.activeImage
  ){

    e.preventDefault();

    const dx =
      e.touches[0].clientX -
      e.touches[1].clientX;

    const dy =
      e.touches[0].clientY -
      e.touches[1].clientY;

    const dist = Math.sqrt(dx*dx + dy*dy);

    if(lastPinchDist){

      const ratio = dist / lastPinchDist;

      state.activeImage.size *= ratio;

      state.activeImage.size =
        Math.max(
          40,
          Math.min(700,state.activeImage.size)
        );

      redrawCanvas();

      const hint = document.getElementById('hint');

      hint.textContent =
        Math.round(state.activeImage.size) + 'px';

      hint.classList.add('show');

      clearTimeout(hint._t);

      hint._t = setTimeout(()=>{
        hint.classList.remove('show');
      },700);
    }

    lastPinchDist = dist;
  }

},{passive:false});

canvas.addEventListener('touchend',()=>{
  lastPinchDist = null;
});

/* IMAGE PANEL */

function togglePanel(){
  document.getElementById('img-panel')
    .classList.toggle('open');
}

document.getElementById('file-input')
.addEventListener('change',(e)=>{

  const files = Array.from(e.target.files);

  files.forEach(file=>{

    const reader = new FileReader();

    reader.onload = ev=>{

      state.images.push(ev.target.result);

      renderImages();
    };

    reader.readAsDataURL(file);

  });

});

function renderImages(){

  const grid = document.getElementById('img-grid');

  grid.querySelectorAll('.thumb')
    .forEach(t=>t.remove());

  state.images.forEach(src=>{

    const img = document.createElement('img');

    img.src = src;

    img.className =
      'thumb' +
      (state.selectedImg === src ? ' selected' : '');

    img.onclick = ()=>{

      state.selectedImg = src;

      renderImages();

      setTool('stamp');

      togglePanel();

      showToast('Tap to place image');
    };

    grid.appendChild(img);

  });

}

/* SAVE */

function saveCanvas(){

  const merged = document.createElement('canvas');

  merged.width = canvas.width;
  merged.height = canvas.height;

  const mctx = merged.getContext('2d');

  const video = document.getElementById('video');

  if(video.readyState >= 2){

    mctx.save();

    if(state.cameraFacing === 'user'){
      mctx.translate(merged.width,0);
      mctx.scale(-1,1);
    }

    mctx.drawImage(
      video,
      0,
      0,
      merged.width,
      merged.height
    );

    mctx.restore();
  }

  mctx.drawImage(canvas,0,0);

  const link = document.createElement('a');

  link.download = 'ar-draw.png';

  link.href = merged.toDataURL('image/png');

  link.click();

  showToast('Saved');
}

/* CLEAR */

function clearAll(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  state.placedImages = [];

  redrawCanvas();

  showToast('Cleared');
}

/* TOAST */

let toastTimer;

function showToast(msg){

  const t = document.getElementById('toast');

  t.textContent = msg;

  t.classList.add('show');

  clearTimeout(toastTimer);

  toastTimer = setTimeout(()=>{
    t.classList.remove('show');
  },2000);
}
</script>

</body>
</html>
