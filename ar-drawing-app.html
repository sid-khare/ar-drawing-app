<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AR Draw</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --ink: #0a0a0f;
    --void: #050508;
    --neon: #00ffb3;
    --neon2: #ff3c78;
    --neon3: #7b5cff;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--void);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    touch-action: none;
    color: white;
  }

  /* ── SPLASH ── */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--void);
    gap: 16px;
    transition: opacity 0.5s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  .logo-mark {
    width: 72px; height: 72px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--neon3), var(--neon));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(123,92,255,0.5);
    animation: pulse-logo 2s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%,100% { box-shadow: 0 0 40px rgba(123,92,255,0.5); }
    50% { box-shadow: 0 0 70px rgba(0,255,179,0.5); }
  }

  .app-title {
    font-family: 'Space Mono', monospace;
    font-size: 28px; letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--neon), var(--neon3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .app-sub { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

  .start-btn {
    margin-top: 24px;
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--neon3), var(--neon));
    border: none; border-radius: 50px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; letter-spacing: 3px;
    color: var(--void); font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(123,92,255,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .start-btn:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(123,92,255,0.3); }

  /* ── CAMERA LAYER ── */
  #camera-container {
    position: fixed; inset: 0;
    background: #111;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror front cam */
  }

  /* ── DRAWING CANVAS ── */
  #draw-canvas {
    position: fixed; inset: 0;
    touch-action: none;
    cursor: crosshair;
  }

  /* ── STAMP CANVAS ── */
  #stamp-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
  }

  /* ── FLOATING IMAGE ── */
  #floating-img {
    position: fixed;
    display: none;
    pointer-events: none;
    transform-origin: center center;
    z-index: 10;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  /* ── UI OVERLAY ── */
  #ui {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  /* Top bar */
  .top-bar {
    pointer-events: all;
    position: absolute; top: 0; left: 0; right: 0;
    padding: 52px 16px 12px;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  .mode-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.3s;
  }
  .mode-badge.active { background: var(--neon3); border-color: var(--neon3); color: white; }

  .spacer { flex: 1; }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer;
    transition: all 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }

  /* Bottom toolbar */
  .bottom-bar {
    pointer-events: all;
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 16px calc(var(--safe-bottom) + 20px);
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Color row */
  .color-row {
    display: flex; align-items: center; gap: 8px;
    overflow-x: auto; padding-bottom: 2px;
    scrollbar-width: none;
  }
  .color-row::-webkit-scrollbar { display: none; }

  .color-swatch {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch.active { border-color: white; transform: scale(1.2); }
  .color-swatch:active { transform: scale(0.9); }

  .size-slider {
    flex-shrink: 0;
    -webkit-appearance: none;
    width: 80px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px; outline: none;
  }
  .size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  /* Tool row */
  .tool-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }

  .tool-btn {
    flex: 1;
    height: 48px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    gap: 6px; cursor: pointer;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.8);
    transition: all 0.15s;
  }
  .tool-btn span.icon { font-size: 18px; }
  .tool-btn.active {
    background: rgba(123,92,255,0.3);
    border-color: var(--neon3);
    color: white;
    box-shadow: 0 0 16px rgba(123,92,255,0.3);
  }
  .tool-btn:active { transform: scale(0.96); }
  .tool-btn.danger.active { background: rgba(255,60,120,0.3); border-color: var(--neon2); box-shadow: 0 0 16px rgba(255,60,120,0.3); }

  /* Image panel */
  #img-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 30;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
    border-radius: 24px 24px 0 0;
    padding: 16px 16px calc(var(--safe-bottom) + 16px);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  #img-panel.open { transform: translateY(0); }

  .panel-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .panel-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 14px;
  }

  .img-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px; max-height: 200px; overflow-y: auto;
  }
  .img-thumb {
    aspect-ratio: 1;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    background: rgba(255,255,255,0.05);
  }
  .img-thumb.selected { border-color: var(--neon3); box-shadow: 0 0 12px rgba(123,92,255,0.5); }
  .img-thumb:active { transform: scale(0.95); }

  .upload-tile {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 2px dashed rgba(255,255,255,0.2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; font-size: 10px;
    color: rgba(255,255,255,0.4);
    transition: all 0.15s;
  }
  .upload-tile:active { border-color: var(--neon3); color: var(--neon3); }
  .upload-tile .plus { font-size: 24px; line-height: 1; }

  .close-panel {
    margin-top: 14px;
    width: 100%; padding: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: rgba(255,255,255,0.7);
    font-size: 13px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.5px;
  }

  /* Opacity slider overlay */
  #opacity-hint {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 16px; padding: 12px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--neon);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
  }
  #opacity-hint.show { opacity: 1; }

  /* Toast */
  #toast {
    position: fixed; top: 120px; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 8px 18px;
    font-size: 12px; letter-spacing: 0.5px;
    color: rgba(255,255,255,0.8);
    pointer-events: none; opacity: 0;
    transition: all 0.3s; z-index: 60;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Camera off state */
  #no-cam {
    position: fixed; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; background: #0a0a0f;
    z-index: 5;
  }
  #no-cam .nc-icon { font-size: 48px; opacity: 0.3; }
  #no-cam p { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; max-width: 220px; line-height: 1.6; }

  input[type=file] { display: none; }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="logo-mark">✏️</div>
  <div class="app-title">AR Draw</div>
  <div class="app-sub">AUGMENTED REALITY CANVAS</div>
  <button class="start-btn" onclick="startApp()">OPEN CAMERA</button>
</div>

<!-- Camera -->
<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
</div>

<!-- No cam fallback -->
<div id="no-cam">
  <div class="nc-icon">📷</div>
  <p>Camera access denied. Drawing works on canvas without AR.</p>
</div>

<!-- Canvases -->
<canvas id="stamp-canvas"></canvas>
<canvas id="draw-canvas"></canvas>

<!-- Floating image for stamp preview -->
<img id="floating-img" src="" alt="">

<!-- Opacity hint -->
<div id="opacity-hint">100%</div>

<!-- Toast -->
<div id="toast"></div>

<!-- UI -->
<div id="ui">
  <div class="top-bar">
    <div class="mode-badge active" id="mode-label">DRAW</div>
    <div class="spacer"></div>
    <div class="icon-btn" onclick="flipCamera()" title="Flip">🔄</div>
    <div class="icon-btn" onclick="saveCanvas()" title="Save">💾</div>
    <div class="icon-btn" onclick="clearAll()" title="Clear">🗑️</div>
  </div>

  <div class="bottom-bar">
    <!-- Color + size row -->
    <div class="color-row">
      <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff" onclick="setColor(this)"></div>
      <div class="color-swatch" style="background:#00ffb3" data-color="#00ffb3" onclick="setColor(this)"></div>
      <div class="color-swatch" style="background:#ff3c78" data-color="#ff3c78" onclick="setColor(this)"></div>
      <div class="color-swatch" style="background:#7b5cff" data-color="#7b5cff" onclick="setColor(this)"></div>
      <div class="color-swatch" style="background:#ffd700" data-color="#ffd700" onclick="setColor(this)"></div>
      <div class="color-swatch" style="background:#ff8c00" data-color="#ff8c00" onclick="setColor(this)"></div>
      <div class="color-swatch" style="background:#00bfff" data-color="#00bfff" onclick="setColor(this)"></div>
      <div class="color-swatch" style="background:#ff0000" data-color="#ff0000" onclick="setColor(this)"></div>
      <div class="color-swatch" style="background:rgba(0,0,0,0.01); border: 2px dashed rgba(255,255,255,0.3)" data-color="eraser" onclick="setColor(this)" title="Eraser">⚪</div>
      <input type="range" class="size-slider" id="size-slider" min="2" max="40" value="6" oninput="setBrushSize(this.value)">
    </div>

    <!-- Tool row -->
    <div class="tool-row">
      <div class="tool-btn active" id="tool-draw" onclick="setTool('draw')">
        <span class="icon">✏️</span> Draw
      </div>
      <div class="tool-btn" id="tool-stamp" onclick="setTool('stamp')">
        <span class="icon">🖼️</span> Stamp
      </div>
      <div class="tool-btn" id="tool-images" onclick="toggleImgPanel()">
        <span class="icon">📁</span> Images
      </div>
    </div>
  </div>
</div>

<!-- Image Panel -->
<div id="img-panel">
  <div class="panel-handle"></div>
  <div class="panel-title">Your Images</div>
  <div class="img-grid" id="img-grid">
    <div class="upload-tile" onclick="document.getElementById('file-input').click()">
      <div class="plus">+</div>
      <div>Add Photo</div>
    </div>
  </div>
  <button class="close-panel" onclick="toggleImgPanel()">Done</button>
</div>

<input type="file" id="file-input" accept="image/*" multiple onchange="handleFileUpload(event)">

<script>
// ── STATE ──
const state = {
  tool: 'draw',
  color: '#ffffff',
  brushSize: 6,
  isDrawing: false,
  lastX: 0, lastY: 0,
  images: [],
  selectedImg: null,
  stampOpacity: 1,
  stampScale: 1,
  cameraFacing: 'environment',
  stream: null,
  panelOpen: false,
};

// ── CANVAS SETUP ──
const drawCanvas = document.getElementById('draw-canvas');
const stampCanvas = document.getElementById('stamp-canvas');
const ctx = drawCanvas.getContext('2d');
const sctx = stampCanvas.getContext('2d');

function resizeCanvases() {
  drawCanvas.width = window.innerWidth;
  drawCanvas.height = window.innerHeight;
  stampCanvas.width = window.innerWidth;
  stampCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvases);
resizeCanvases();

// ── SPLASH ──
async function startApp() {
  await startCamera();
  document.getElementById('splash').classList.add('hidden');
}

// ── CAMERA ──
async function startCamera() {
  try {
    if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); }
    const constraints = {
      video: {
        facingMode: state.cameraFacing,
        width: { ideal: window.innerWidth * 2 },
        height: { ideal: window.innerHeight * 2 }
      }
    };
    state.stream = await navigator.mediaDevices.getUserMedia(constraints);
    document.getElementById('video').srcObject = state.stream;
    // Mirror for front cam
    document.getElementById('video').style.transform =
      state.cameraFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
  } catch (e) {
    document.getElementById('no-cam').style.display = 'flex';
    document.getElementById('camera-container').style.display = 'none';
  }
}

async function flipCamera() {
  state.cameraFacing = state.cameraFacing === 'environment' ? 'user' : 'environment';
  await startCamera();
  showToast(state.cameraFacing === 'user' ? 'Front camera' : 'Back camera');
}

// ── TOOL SELECTION ──
function setTool(tool) {
  state.tool = tool;
  ['draw','stamp'].forEach(t => {
    document.getElementById('tool-' + t).classList.toggle('active', t === tool);
  });
  document.getElementById('mode-label').textContent = tool.toUpperCase();
  drawCanvas.style.cursor = tool === 'draw' ? 'crosshair' : 'copy';

  if (tool === 'stamp') {
    showToast('Tap to stamp your image');
    if (!state.selectedImg) toggleImgPanel();
  }
  if (tool === 'draw') {
    document.getElementById('floating-img').style.display = 'none';
  }
}

// ── COLOR ──
function setColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  state.color = el.dataset.color;
  if (state.tool === 'stamp') setTool('draw');
}

function setBrushSize(v) { state.brushSize = parseInt(v); }

// ── DRAWING ──
function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - rect.left, src.clientY - rect.top];
}

function startDraw(e) {
  e.preventDefault();
  if (state.tool === 'stamp') { doStamp(e); return; }
  state.isDrawing = true;
  [state.lastX, state.lastY] = getPos(e);
  ctx.beginPath();
  ctx.arc(state.lastX, state.lastY, state.brushSize / 2, 0, Math.PI * 2);
  if (state.color === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = state.color;
  }
  ctx.fill();
}

function draw(e) {
  e.preventDefault();
  if (!state.isDrawing || state.tool !== 'draw') return;
  const [x, y] = getPos(e);

  ctx.beginPath();
  ctx.moveTo(state.lastX, state.lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = state.color === 'eraser' ? 'rgba(0,0,0,1)' : state.color;
  ctx.lineWidth = state.brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (state.color === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
  } else {
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.stroke();
  [state.lastX, state.lastY] = [x, y];
}

function endDraw(e) { state.isDrawing = false; }

drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
drawCanvas.addEventListener('touchmove', draw, { passive: false });
drawCanvas.addEventListener('touchend', endDraw, { passive: false });
drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', draw);
drawCanvas.addEventListener('mouseup', endDraw);

// ── STAMPING ──
function doStamp(e) {
  if (!state.selectedImg) { showToast('Pick an image first!'); toggleImgPanel(); return; }
  const [x, y] = getPos(e);
  const size = 120 * state.stampScale;
  const img = new Image();
  img.src = state.selectedImg;
  img.onload = () => {
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = state.stampOpacity;
    ctx.save();
    ctx.translate(x, y);
    ctx.drawImage(img, -size/2, -size/2, size, size);
    ctx.restore();
    ctx.globalAlpha = 1;
  };
}

// ── IMAGE UPLOAD ──
function handleFileUpload(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      state.images.push(ev.target.result);
      renderImgGrid();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderImgGrid() {
  const grid = document.getElementById('img-grid');
  // clear all thumbs, keep upload tile
  const thumbs = grid.querySelectorAll('.img-thumb');
  thumbs.forEach(t => t.remove());

  state.images.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.className = 'img-thumb' + (state.selectedImg === src ? ' selected' : '');
    img.onclick = () => selectImage(src);
    grid.appendChild(img);
  });
}

function selectImage(src) {
  state.selectedImg = src;
  renderImgGrid();
  setTool('stamp');
  toggleImgPanel();
  showToast('Tap anywhere to stamp!');
}

// ── IMAGE PANEL ──
function toggleImgPanel() {
  state.panelOpen = !state.panelOpen;
  document.getElementById('img-panel').classList.toggle('open', state.panelOpen);
}

// ── CLEAR ──
function clearAll() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  sctx.clearRect(0, 0, stampCanvas.width, stampCanvas.height);
  showToast('Canvas cleared');
}

// ── SAVE ──
function saveCanvas() {
  const merged = document.createElement('canvas');
  merged.width = drawCanvas.width;
  merged.height = drawCanvas.height;
  const mctx = merged.getContext('2d');

  // Grab video frame
  const video = document.getElementById('video');
  if (video.readyState >= 2) {
    mctx.save();
    if (state.cameraFacing === 'user') {
      mctx.translate(merged.width, 0);
      mctx.scale(-1, 1);
    }
    mctx.drawImage(video, 0, 0, merged.width, merged.height);
    mctx.restore();
  }
  mctx.drawImage(drawCanvas, 0, 0);

  const link = document.createElement('a');
  link.download = 'ar-drawing-' + Date.now() + '.png';
  link.href = merged.toDataURL('image/png');
  link.click();
  showToast('Saved to photos! 📸');
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── PINCH TO SCALE STAMP ──
let lastPinchDist = null;
drawCanvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && state.tool === 'stamp') {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastPinchDist) {
      const ratio = dist / lastPinchDist;
      state.stampScale = Math.max(0.3, Math.min(4, state.stampScale * ratio));

      const hint = document.getElementById('opacity-hint');
      hint.textContent = Math.round(state.stampScale * 100) + '%';
      hint.classList.add('show');
      clearTimeout(hint._t);
      hint._t = setTimeout(() => hint.classList.remove('show'), 800);
    }
    lastPinchDist = dist;
  }
}, { passive: false });
drawCanvas.addEventListener('touchend', () => { lastPinchDist = null; });

// ── INIT ──
showToast('Open camera to start drawing!');
</script>
</body>
